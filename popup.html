<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <title>GitHub Everywhere</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <header class="hdr">
      <div class="brand">
        <svg viewBox="0 0 16 16" width="20" height="20" aria-hidden="true">
          <path fill="currentColor" d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0016 8c0-4.42-3.58-8-8-8z"/>
        </svg>
        <span>GitHub Everywhere</span>
      </div>
    </header>

    <main class="body">
      <section class="block">
        <div class="row stack">
          <label class="label" for="theme">Theme</label>
          <select id="theme">
            <option value="auto">Auto (theo hệ thống)</option>
            <option value="light">Light</option>
            <option value="dark">Dark</option>
          </select>
        </div>
      </section>

      <section class="block">
        <div class="row">
          <label class="label">Site hiện tại</label>
          <span id="current-host" class="mono">—</span>
        </div>
        <button id="toggle-current" class="btn btn-primary" disabled>Bật cho site này</button>
      </section>

      <section class="block">
        <div class="row">
          <label class="label">Danh sách site đã bật</label>
          <span id="count" class="muted">0</span>
        </div>
        <div id="site-list" class="list"></div>
        <div class="add-row">
          <input id="add-host" type="text" placeholder="domain.com" />
          <button id="add-btn" class="btn">Thêm</button>
        </div>
      </section>

      <button id="reload" class="btn btn-ghost">Reload tab</button>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
